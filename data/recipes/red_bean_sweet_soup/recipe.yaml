name: Red Bean Sweet Soup
cuisine: Chinese
servings: 4
tags: [dessert, vegetarian, make-ahead, gluten-free]

description: |
  1. Rinse red beans and soak in cold water for 6–8 hours (or overnight). Drain.
  2. Place soaked beans in a pot with 1.2 litres of fresh water and the pandan leaves. Bring to a boil.
  3. Skim any foam, then reduce heat to low. Simmer uncovered for 60–75 minutes until beans are soft and some have split open.
  4. Add rock sugar and stir until fully dissolved. Simmer for a further 10 minutes.
  5. Remove pandan leaves. Ladle into bowls and drizzle with coconut milk before serving.
  6. Can be served warm, at room temperature, or chilled.

ingredients:
  - ingredient: red_beans
    quantity_g: 200
  - ingredient: rock_sugar
    quantity_g: 80
  - ingredient: coconut_milk
    quantity_g: 100
  - ingredient: pandan
    quantity_leaves: 3
