name: Carrot Salad
cuisine: Asian
servings: 2
tags: [vegetarian, appetizer, quick, no-cook]

description: |
  1. Julienne carrots and slice cucumber into thin half-moons.
  2. Mince garlic finely. Roughly chop fresh coriander.
  3. In a large bowl, whisk together sesame oil, soy sauce, rice vinegar, sugar, black pepper, and chili flakes to make the dressing.
  4. Add carrots, cucumber, and garlic to the bowl. Toss well until evenly coated.
  5. Transfer to a serving plate. Top with roasted sesame seeds and fresh coriander before serving.

ingredients:
  - ingredient: carrot
    quantity_g: 200
  - ingredient: cucumber
    quantity_g: 100
  - ingredient: garlic
    quantity_g: 5
  - ingredient: coriander
    quantity_g: 8
  - ingredient: sesame_oil
    quantity_g: 10
  - ingredient: soy_sauce
    quantity_g: 15
  - ingredient: rice_vinegar
    quantity_g: 10
  - ingredient: sugar
    quantity_g: 5
  - ingredient: black_pepper
    quantity_g: 1
  - ingredient: chili_flakes
    quantity_g: 2
  - ingredient: roasted_sesame_seeds
    quantity_g: 10
