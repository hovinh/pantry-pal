name: Chicken Stir Fry
cuisine: Asian
servings: 2
tags: [high-protein, quick]
description: |
  1. Slice chicken breast into thin strips. Mince garlic and ginger.
  2. Heat sesame oil in a wok over high heat. Stir-fry chicken 4–5 min until cooked through; set aside.
  3. In the same wok, stir-fry broccoli and bell pepper 3 min. Add garlic and ginger; cook 30 sec.
  4. Return chicken to the wok, add soy sauce, toss everything together, and serve.

ingredients:
  - ingredient: chicken_breast
    quantity_g: 300
  - ingredient: broccoli
    quantity_g: 150
  - ingredient: bell_pepper
    quantity_g: 100
  - ingredient: ginger
    quantity_g: 15
  - ingredient: garlic
    quantity_g: 10
  - ingredient: soy_sauce
    quantity_g: 30
  - ingredient: sesame_oil
    quantity_g: 10
