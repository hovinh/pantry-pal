name: Sushi Bake
cuisine: Japanese
servings: 2
tags: [main course, family-friendly, make-ahead]

description: |
  1. Heat oil in a large skillet over medium heat. Add minced garlic and sauté until fragrant, about 1 minute.
  2. Add julienned carrots and cucumber to the skillet and cook for 2-3 minutes until slightly tender.
  3. In a small bowl, whisk together soy sauce, vinegar, sugar, water, pepper, and chili flakes to make the sauce.
  4. Add the cooked noodles to the skillet with the vegetables and pour the sauce over them. Toss everything together until well coated and heated through.
  5. Serve immediately, garnished with roasted sesame seeds and chopped coriander if desired.
    
ingredients:
  - ingredient: carrot
    quantity_g: 200
  - ingredient: cucumber
    quantity_g: 100
  - ingredient: sesame oil
    quantity_ml: 10
  - ingredient: coriander
    quantity_g: 5
