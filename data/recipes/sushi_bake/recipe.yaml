    quantity_g: 5
  - ingredient: roasted sesame seeds
    quantity_g: 10
  - ingredient: pepper
    quantity_g: 2
  - ingredient: chili flakes
    quantity_g: 2
  - ingredient: soy sauce
    quantity_ml: 15
