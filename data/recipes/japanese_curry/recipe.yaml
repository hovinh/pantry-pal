name: Japanese Curry
cuisine: Japanese
servings: 2
tags: [main course, hearty, family-friendly]

description: |
  1. Cut chicken breast into bite-sized pieces and season lightly with salt and black pepper.
  2. Heat vegetable oil in a large pot over medium-high heat. Brown the chicken for 3–4 minutes, then set aside.
  3. In the same pot, sauté sliced onion until golden, about 8 minutes.
  4. Add garlic and ginger; cook 1 minute until fragrant.
  5. Return chicken to the pot. Add carrots and potatoes, then pour in 600 ml water. Bring to a boil and skim any foam.
  6. Reduce heat and simmer for 15 minutes until vegetables are just tender.
  7. Break curry roux blocks into the pot and stir until fully dissolved. Simmer for 10 minutes, stirring occasionally, until the sauce thickens.
  8. Serve over steamed rice.

ingredients:
  - ingredient: chicken_breast
    quantity_g: 300
  - ingredient: onion
    quantity_g: 150
  - ingredient: carrot
    quantity_g: 150
  - ingredient: potato
    quantity_g: 200
  - ingredient: curry_roux
    quantity_g: 80
  - ingredient: garlic
    quantity_g: 10
  - ingredient: ginger
    quantity_g: 5
  - ingredient: vegetable_oil
    quantity_g: 15
  - ingredient: rice
    quantity_g: 200
  - ingredient: salt
    quantity_tsp: 0.25
  - ingredient: black_pepper
    quantity_tsp: 0.25
