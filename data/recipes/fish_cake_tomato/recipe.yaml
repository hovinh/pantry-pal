name: Mackerel Fish Cake with Tomato Sauce
cuisine: Vietnamese
servings: 2
tags: [main course, seafood, quick]

description: |
  1. Drain and flake canned mackerel into a bowl. Add one beaten egg, chopped coriander, black pepper, and chili flakes. Mix until combined, then shape into small round patties about 1.5 cm thick.
  2. Heat vegetable oil in a skillet over medium heat. Pan-fry fish cakes for 3–4 minutes per side until golden brown. Remove and set aside.
  3. In the same skillet, sauté minced garlic and diced onion for 2 minutes until softened.
  4. Add diced tomato and soy sauce; cook for 5–7 minutes, stirring occasionally, until the tomatoes break down into a saucy consistency.
  5. Return fish cakes to the pan and simmer in the sauce for 3 minutes.
  6. Serve hot over steamed rice, garnished with fresh coriander.

