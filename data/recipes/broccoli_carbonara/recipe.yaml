name: Broccoli Carbonara
cuisine: Italian
servings: 2
tags: [vegetarian, main course, quick]

description: |
  1. Cook pasta according to package instructions until al dente. Drain and set aside.
  2. In a large skillet, heat olive oil over medium heat. Add minced garlic and sauté until fragrant, about 1 minute.
  3. Add chopped broccoli to the skillet and cook until tender, about 5-7 minutes.
  4. In a bowl, whisk together eggs, grated Parmesan cheese, salt, and pepper.
  5. Add the cooked pasta to the skillet with the broccoli and toss to combine. Remove from heat.
  6. Slowly pour the egg mixture over the pasta, tossing quickly to create a creamy sauce. The residual heat will cook the eggs without scrambling them.
  7. Serve immediately, garnished with additional Parmesan cheese and chopped parsley if desired.
  
