name: Broccoli Carbonara
cuisine: Italian
servings: 2
tags: [vegetarian, pasta, quick]

description: |
  1. Cook pasta in well-salted boiling water until al dente. Reserve 120 ml pasta water, then drain.
  2. Cut broccoli into small florets. Add to the pasta water in the last 3 minutes of cooking, then drain together.
  3. In a bowl, whisk eggs and finely grated Parmesan until combined. Season generously with black pepper.
  4. Heat olive oil in a large pan over medium heat. Add minced garlic and sauté for 1 minute until fragrant. Remove from heat.
  5. Add the hot pasta and broccoli to the pan. Pour the egg mixture over and toss quickly, adding reserved pasta water a splash at a time until the sauce is creamy and coats the pasta.
  6. Serve immediately with extra Parmesan and black pepper.

ingredients:
  - ingredient: pasta
    quantity_g: 200
  - ingredient: broccoli
    quantity_g: 200
  - ingredient: eggs
    quantity: 2
    quantity_g: 110
  - ingredient: parmesan_cheese
    quantity_g: 50
  - ingredient: garlic
    quantity_cloves: 2
    quantity_g: 10
  - ingredient: olive_oil
    quantity_tbsp: 2
    quantity_g: 27
  - ingredient: salt
    quantity_tsp: 0.5
  - ingredient: black_pepper
    quantity_tsp: 0.5
