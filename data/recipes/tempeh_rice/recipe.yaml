name: Indonesian Tempeh Rice
cuisine: Indonesian
servings: 2
tags: [main course, vegetarian, quick]

description: |
  1. Slice tempeh into thin strips or small cubes. Pat dry with paper towel.
  2. Heat vegetable oil in a wok over medium-high heat. Fry tempeh until golden and crisp on all sides, about 5–7 minutes. Remove and set aside.
  3. In the same wok, sauté minced garlic and diced onion for 2 minutes until fragrant.
  4. Add cooked rice and stir-fry, breaking up any clumps, for 2 minutes.
  5. Return tempeh to the wok. Add soy sauce and chili flakes; toss everything together for 2–3 minutes until well combined and heated through.
  6. Garnish with sliced spring onion and serve hot.

ingredients:
  - ingredient: tempeh
    quantity_g: 200
  - ingredient: rice
    quantity_g: 200
  - ingredient: garlic
    quantity_g: 10
  - ingredient: onion
    quantity_g: 80
  - ingredient: soy_sauce
    quantity_g: 20
  - ingredient: chili_flakes
    quantity_g: 3
  - ingredient: vegetable_oil
    quantity_g: 15
  - ingredient: spring_onion
    quantity_g: 20
