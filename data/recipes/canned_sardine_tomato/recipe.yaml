name: Canned Sardine Stir-Fried with Tomato
cuisine: Asian
servings: 2
tags: [main course, quick, pantry-friendly, seafood]

description: |
  1. Drain the canned sardines. If using whole sardines, roughly break them into large chunks.
  2. Heat olive oil in a pan over medium heat. Add minced garlic and sliced onion; sauté for 3 minutes until softened.
  3. Add canned tomato and stir. Cook for 5 minutes until the sauce deepens in colour.
  4. Add sardines, soy sauce, sugar, chili flakes, and black pepper. Stir gently to combine without breaking up the fish too much.
  5. Simmer for 3–4 minutes until the sauce is slightly reduced.
  6. Garnish with fresh coriander and serve over steamed rice.

ingredients:
  - ingredient: canned_sardine
    quantity_g: 200
  - ingredient: canned_tomato
    quantity_g: 200
  - ingredient: onion
    quantity_g: 100
  - ingredient: garlic
    quantity_g: 10
  - ingredient: olive_oil
    quantity_g: 15
  - ingredient: soy_sauce
    quantity_g: 10
  - ingredient: sugar
    quantity_g: 5
  - ingredient: chili_flakes
    quantity_g: 2
  - ingredient: coriander
    quantity_g: 5
  - ingredient: black_pepper
    quantity_g: 1
