name: Mala Noodle
cuisine: Chinese
servings: 2
tags: [spicy, main course, quick]

description: |
  1. Cook noodles according to package instructions until just tender. Drain and rinse briefly with cold water; set aside.
  2. Blanch bok choy in the same boiling water for 30 seconds; drain.
  3. In a small bowl, stir together mala paste, soy sauce, and sesame oil. Loosen with 2 tablespoons of the noodle cooking water.
  4. Divide noodles between two bowls. Pour the mala sauce over and toss to coat.
  5. Top with bok choy, spring onion, roasted sesame seeds, and chili flakes. Serve immediately.

ingredients:
  - ingredient: noodles
    quantity_g: 200
  - ingredient: mala_paste
    quantity_g: 30
  - ingredient: bok_choy
    quantity_g: 100
  - ingredient: garlic
    quantity_g: 10
  - ingredient: sesame_oil
    quantity_g: 10
  - ingredient: soy_sauce
    quantity_g: 15
  - ingredient: roasted_sesame_seeds
    quantity_g: 8
  - ingredient: spring_onion
    quantity_g: 20
  - ingredient: chili_flakes
    quantity_g: 3
