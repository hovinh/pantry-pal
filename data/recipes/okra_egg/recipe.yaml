name: Stir‑Fried Okra Egg
cuisine: Chinese
servings: 2
tags: [main course, vegetarian, quick]

description: |
  1. Rinse the okra and cut off the tops.
  2. Heat the sesame oil in a wok or large skillet over high heat.
  3. Add the garlic and coriander and stir for about 30 seconds until fragrant.
  4. Add the okra and stir-fry for about 5 minutes until tender.
  5. Push the okra to the side of the wok and crack the eggs into the empty space.
  6. Scramble the eggs until cooked through.
  7. Add the soy sauce, vinegar, and sugar and stir to combine.
  8. Serve hot with rice.
  2. Drain the soaked beans and place them in a pot with 4 cups of water. Bring to a boil, then reduce heat and simmer for about 1 hour until the beans are soft.
  3. Add sugar to the pot and stir until it dissolves. Simmer for another 10 minutes to allow the flavors to meld together.
  4. Serve the sweet soup warm or chilled, garnished with a drizzle of coconut milk if desired.
      
