name: Stir-Fried Okra with Egg
cuisine: Chinese
servings: 2
tags: [main course, vegetarian, quick]

description: |
  1. Trim the tops from the okra and slice diagonally into 2 cm pieces. Pat dry to reduce stickiness.
  2. Heat sesame oil in a wok over high heat. Add minced garlic and stir-fry for 30 seconds until fragrant.
  3. Add okra and stir-fry for 3–4 minutes until bright green and just tender, but still with a slight bite.
  4. Push okra to the sides of the wok. Crack eggs into the centre and scramble until just set.
  5. Toss everything together. Add soy sauce and oyster sauce; stir-fry for 1 more minute.
  6. Garnish with sliced spring onion and serve over steamed rice.

ingredients:
  - ingredient: okra
    quantity_g: 200
  - ingredient: eggs
    quantity: 2
    quantity_g: 110
  - ingredient: garlic
    quantity_g: 10
  - ingredient: sesame_oil
    quantity_g: 10
  - ingredient: soy_sauce
    quantity_g: 15
  - ingredient: oyster_sauce
    quantity_g: 15
  - ingredient: spring_onion
    quantity_g: 20
